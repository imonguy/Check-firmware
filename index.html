<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung FOTA Hub</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #3b82f6; --text: #fafafa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #27272a; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        .m-name { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .v-box { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 13px; word-break: break-all; }
        .time { font-size: 11px; color: #52525b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Galaxy FOTA Tracker</h2>
        <div id="list">Đang lấy dữ liệu từ Server...</div>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('list').innerHTML = d.map(i => `
                    <div class="card">
                        <div class="m-name">${i.name} (${i.model})</div>
                        <div class="v-box">${i.version}</div>
                        <div class="time">🕒 Check: ${i.time} | CSC: ${i.csc}</div>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('list').innerHTML = "Chưa có dữ liệu. Vui lòng bấm Run Actions!"; }
        }
        load();
    </script>
</body>
</html>
