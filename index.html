<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Firmware Tracker</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --text: #fafafa; --primary: #3b82f6; --border: #27272a; --success: #10b981; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 24px; margin-bottom: 5px; color: var(--primary); }
        .subtitle { color: #71717a; font-size: 14px; }
        
        #list { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; transition: 0.2s; }
        .card:hover { border-color: var(--primary); }
        .model-name { font-weight: bold; font-size: 18px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .csc-badge { font-size: 11px; background: #27272a; padding: 2px 8px; border-radius: 4px; color: #a1a1aa; }
        .v-box { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: var(--success); padding: 12px; border-radius: 10px; font-family: ui-monospace, monospace; font-size: 13px; margin-top: 12px; word-break: break-all; line-height: 1.4; }
        .time { font-size: 11px; color: #52525b; margin-top: 12px; display: flex; align-items: center; gap: 5px; }
        
        .loading { text-align: center; color: #52525b; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Galaxy FOTA Tracker</h1>
            <div class="subtitle">Tự động cập nhật từ Samsung Server</div>
        </header>

        <div id="list">
            <div class="loading">Đang tải dữ liệu firmware...</div>
        </div>
    </div>

    <script>
        async function updateUI() {
            try {
                // Thêm tham số t để tránh lưu cache
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                
                const html = data.map(item => `
                    <div class="card">
                        <div class="model-name">
                            ${item.model}
                            <span class="csc-badge">${item.csc}</span>
                        </div>
                        <div class="v-box">${item.version}</div>
                        <div class="time">🕒 Cập nhật: ${item.time}</div>
                    </div>
                `).join('');
                
                document.getElementById('list').innerHTML = html;
            } catch (error) {
                document.getElementById('list').innerHTML = `
                    <div style="text-align:center; color:#ef4444; padding:20px;">
                        Chưa có dữ liệu. Hãy chạy Action trên GitHub trước!
                    </div>`;
            }
        }

        updateUI();
        // Tự động làm mới mỗi 1 phút
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
