<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant FOTA Check</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --text: #fafafa; --primary: #3b82f6; --border: #27272a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .search-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input { padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #27272a; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 15px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        /* Khu vực hiển thị kết quả */
        #result-area { margin-top: 25px; display: none; border-top: 1px solid var(--border); padding-top: 20px; }
        .res-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .res-value { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; padding: 15px; border-radius: 10px; font-family: monospace; word-break: break-all; margin-bottom: 15px; }
        .loading { text-align: center; color: var(--primary); font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-card">
        <h2 style="margin-top:0">🔍 Kiểm tra Firmware nhanh</h2>
        <p style="color:#888; font-size: 14px;">Nhập thông tin để lấy build One UI mới nhất từ Samsung Server.</p>
        
        <div class="input-group">
            <input type="text" id="model" placeholder="Model (ví dụ: SM-S928B)" spellcheck="false">
            <input type="text" id="csc" placeholder="CSC (ví dụ: XXV)" spellcheck="false">
            <button id="btn" onclick="quickCheck()">KIỂM TRA NGAY</button>
        </div>

        <div id="loading" class="loading">⏳ Đang truy vấn server Samsung...</div>

        <div id="result-area">
            <div class="res-label">Phiên bản mới nhất (Latest Firmware):</div>
            <div id="ver" class="res-value"></div>
            <div style="font-size: 11px; color:#555">Dữ liệu được lấy trực tiếp từ FOTA Cloud (Protocol 3.0)</div>
        </div>
    </div>
</div>

<script>
    async function quickCheck() {
        const model = document.getElementById('model').value.toUpperCase().trim();
        const csc = document.getElementById('csc').value.toUpperCase().trim();
        const btn = document.getElementById('btn');
        const load = document.getElementById('loading');
        const resArea = document.getElementById('result-area');
        const verDiv = document.getElementById('ver');

        if(!model || !csc) { alert("Bạn chưa nhập đủ Model hoặc CSC kìa!"); return; }

        // Hiệu ứng loading
        btn.disabled = true;
        load.style.display = "block";
        resArea.style.display = "none";

        // Tạo Payload XML chuẩn Samsung
        const payload = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><FUSRequest><Device><Model>${model}</Model><SalesCode>${csc}</SalesCode></Device><Protocol>3.0</Protocol></FUSRequest>`;
        
        // Sử dụng Proxy để lách luật CORS
        const proxyUrl = "https://api.allorigins.win/get?url=";
        const targetUrl = encodeURIComponent("https://fota-cloud-dn.ospserver.net/firmware/FUS/check");

        try {
            const response = await fetch(proxyUrl + targetUrl + "&method=POST&body=" + encodeURIComponent(payload));
            const json = await response.json();
            
            // Giải mã Base64 vì server Samsung trả về dữ liệu mã hóa
            const decodedXml = atob(json.contents);
            
            // Tìm chuỗi phiên bản trong XML (Dùng Regex cho nhanh và nhẹ)
            const match = decodedXml.match(/<fw_version>([^<]+)<\/fw_version>/) || decodedXml.match(/<latest>([^<]+)<\/latest>/);

            if (match && match[1]) {
                verDiv.innerText = match[1];
                resArea.style.display = "block";
            } else {
                verDiv.innerText = "❌ Không tìm thấy dữ liệu. Có thể sai Model/CSC hoặc máy chưa có Firmware.";
                resArea.style.display = "block";
            }
        } catch (e) {
            alert("Lỗi kết nối hoặc Proxy bị quá tải. Hãy thử lại sau vài giây!");
        } finally {
            btn.disabled = false;
            load.style.display = "none";
        }
    }
</script>

</body>
</html>
