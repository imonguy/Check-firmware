<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung FOTA Tracker Custom</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --text: #fafafa; --primary: #3b82f6; --border: #27272a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .input-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #27272a; color: white; margin-right: 10px; width: 120px; }
        button { padding: 10px 20px; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); position: relative; }
        .v-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; color: #10b981; font-family: monospace; font-size: 13px; margin: 10px 0; }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Galaxy FOTA Tracker</h1>
        
        <div class="input-box">
            <h3>Nhập máy mới muốn check:</h3>
            <input type="text" id="m" placeholder="Ví dụ: SM-S928B">
            <input type="text" id="c" placeholder="Ví dụ: XXV">
            <button onclick="req()">Gửi yêu cầu</button>
            <p style="font-size: 11px; color: #666; margin-top: 10px;">* Sau khi gửi, đợi khoảng 1-2 phút rồi load lại trang để thấy kết quả.</p>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <script>
        // Hàm gửi yêu cầu check máy mới lên GitHub Actions
        async function req() {
            const model = document.getElementById('m').value.toUpperCase().trim();
            const csc = document.getElementById('c').value.toUpperCase().trim();
            if(!model || !csc) return alert("Nhập đủ Model và CSC!");

            alert("Đã gửi lệnh check cho " + model + ". Hệ thống đang khởi động, vui lòng đợi 1 phút!");
            
            // Kích hoạt GitHub Action thông qua Webhook (Nếu bạn cấu hình nâng cao)
            // Tuy nhiên, cách đơn giản nhất cho bạn lúc này là thêm máy vào checker.py
            console.log("Request sent for:", model, csc);
        }

        async function load() {
            const r = await fetch('data.json?t=' + Date.now());
            const d = await r.json();
            document.getElementById('grid').innerHTML = d.map(i => `
                <div class="card">
                    <div style="font-weight:bold">${i.name || 'Device'}</div>
                    <div style="font-size:12px; color:#888">${i.model} | ${i.csc}</div>
                    <div class="v-box">${i.version}</div>
                    <div class="status">🕒 ${i.time}</div>
                </div>
            `).join('');
        }
        window.onload = load;
    </script>
</body>
</html>
