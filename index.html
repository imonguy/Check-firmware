<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung FOTA Tracker</title>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --text: #e1e7ef; --primary: #3e81f1; --border: #262c36; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .v-box { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 13px; margin-top: 10px; word-break: break-all; }
        .info { font-size: 12px; color: #888; margin-top: 10px; }
        h2 { text-align: center; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Samsung FOTA Tracker</h2>
        <div id="list">Đang tải dữ liệu...</div>
    </div>

    <script>
        async function load() {
            try {
                // Thêm ?t= để tránh trình duyệt lưu bản cũ
                const r = await fetch('data.json?t=' + Date.now());
                const d = await r.json();
                document.getElementById('list').innerHTML = d.map(i => `
                    <div class="card">
                        <div style="font-weight:bold; font-size: 18px;">${i.model} (${i.csc})</div>
                        <div class="v-box">${i.version}</div>
                        <div class="info">🕒 Cập nhật: ${i.time}</div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('list').innerHTML = "Chưa có dữ liệu. Vui lòng chạy Action trên GitHub.";
            }
        }
        load();
        // Tự động load lại sau mỗi 30 giây
        setInterval(load, 30000);
    </script>
</body>
</html>
